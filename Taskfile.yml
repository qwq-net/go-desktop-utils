version: "3"

vars:
  OUTPUT: desktop-widget.exe
  LDFLAGS: -H windowsgui -s -w

tasks:
  build:
    desc: Build Windows GUI binary
    cmds:
      - GOOS=windows GOARCH=amd64 go build -ldflags="{{.LDFLAGS}}" -o {{.OUTPUT}} ./cmd/desktop-widget
    sources:
      - cmd/**/*.go
      - internal/**/*.go
      - go.mod
      - go.sum
    generates:
      - "{{.OUTPUT}}"

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy

  dist:
    desc: Create distribution zip
    deps: [build]
    vars:
      DIST_DIR: dist/desktop-widget
    cmds:
      - rm -rf dist
      - mkdir -p {{.DIST_DIR}}
      - cp {{.OUTPUT}} {{.DIST_DIR}}/
      - cp configs/config.json {{.DIST_DIR}}/
      - cd dist && zip -r desktop-widget.zip desktop-widget/

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.OUTPUT}} dist

  default:
    desc: Build (default task)
    deps: [build]
